name: Auto Verify Result

on:
  issues:
    types: [closed]

permissions:
  issues: read
  contents: read
  projects: write

jobs:
  update_project:
    runs-on: ubuntu-latest

    steps:
      - name: Update Verify result to Pass (skip if not in project)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const projectId = "PVT_kwHODU2Pas4BJrpY"
              const fieldId = "PVTSSF_lAHODU2Pas4BJrpYzg8dLOY"
              const passOptionId = "f0215876" // 若你確定不會變可保留

              const issueNodeId = context.payload.issue.node_id
              const issueNumber = context.payload.issue.number

              console.log("issueNumber:", issueNumber)
              console.log("issueNodeId:", issueNodeId)

              // 修正：呼叫時要傳入 contentId，否則 filterBy 不會生效
              const query = `
                query($projectId: ID!, $contentId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 50, filterBy: { contentId: $contentId }) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `
              const result = await github.graphql(query, { projectId, contentId: issueNodeId })
              console.log("project items query result:", JSON.stringify(result))

              const item = result.node?.items?.nodes?.[0]

              if (!item) {
                // 如果 Issue 不在 Project，就跳過（不新增也不失敗）
                console.log("Issue is not in this project, skip.")
                return
              }

              // 若有 item，則更新欄位為 Pass
              const updateMutation = `
                mutation($itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemField(input:{
                    itemId:$itemId
                    fieldId:$fieldId
                    value:{ singleSelectOptionId:$optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `
              const updateRes = await github.graphql(updateMutation, {
                itemId: item.id,
                fieldId,
                optionId: passOptionId
              })
              console.log("updateRes:", JSON.stringify(updateRes))
            } catch (err) {
              console.error("Error in auto verify script:", err)
              throw err
            }
