name: Auto Verify Result

on:
  issues:
    types: [closed]

permissions:
  issues: read
  contents: read
  projects: write

jobs:
  update_project:
    runs-on: ubuntu-latest

    steps:
      - name: Update Verify result to Pass
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const projectId = "PVT_kwHODU2Pas4BJrpY"
              const fieldId = "PVTSSF_lAHODU2Pas4BJrpYzg8dLOY"
              // 如果你已知 option id 可以保留作 fallback，否則會用動態查出的值
              const fallbackPassOptionId = "f0215876"

              const issueNodeId = context.payload.issue.node_id
              const issueNumber = context.payload.issue.number

              console.log("issueNumber:", issueNumber)
              console.log("issueNodeId:", issueNodeId)

              // 1. 找 Issue 是否已在 Project（注意這裡要傳 contentId）
              const query = `
                query($projectId: ID!, $contentId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 50, filterBy: { contentId: $contentId }) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `
              const result = await github.graphql(query, { projectId, contentId: issueNodeId })
              console.log("project items query result:", JSON.stringify(result))

              let item = result.node?.items?.nodes?.find(n => n.content?.number === issueNumber)
              console.log("found item:", item)

              // 2. 如果不在 Project → 加進 Project
              if (!item) {
                const addMutation = `
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input:{
                      projectId:$projectId
                      contentId:$contentId
                    }) {
                      item { id }
                    }
                  }
                `
                const addResult = await github.graphql(addMutation, {
                  projectId,
                  contentId: issueNodeId
                })
                console.log("addResult:", JSON.stringify(addResult))
                item = addResult.addProjectV2ItemById.item
              }

              if (!item || !item.id) {
                throw new Error("Could not find or create project item for this issue.")
              }

              // 3. 取得 field 的 options（動態找 Pass option id；避免硬編碼錯誤）
              const fieldsQuery = `
                query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                          ... on ProjectV2Field {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              `
              const fieldsRes = await github.graphql(fieldsQuery, { projectId })
              console.log("fieldsRes:", JSON.stringify(fieldsRes))

              const fields = fieldsRes.node?.fields?.nodes || []
              // 以 fieldId 找欄位；如果沒找到可改用 name 去找
              const targetField = fields.find(f => f.id === fieldId || f.name === "Verify result")
              const passOption = targetField?.options?.find(o => o.name.toLowerCase() === "pass")?.id || fallbackPassOptionId

              if (!passOption) {
                throw new Error("Could not determine Pass option id for the field.")
              }

              console.log("Using optionId:", passOption)

              // 4. 更新 Verify result = Pass
              const updateMutation = `
                mutation($itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemField(input:{
                    itemId:$itemId
                    fieldId:$fieldId
                    value:{ singleSelectOptionId:$optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `
              const updateRes = await github.graphql(updateMutation, {
                itemId: item.id,
                fieldId,
                optionId: passOption
              })
              console.log("updateRes:", JSON.stringify(updateRes))
            } catch (err) {
              console.error("Error in auto verify script:", err)
              throw err
            }
