name: Auto Verify Result

on:
  issues:
    types: [closed]

permissions:
  issues: read
  contents: read
  projects: write

jobs:
  update_project:
    runs-on: ubuntu-latest

    steps:
      - name: Update Verify result to Pass
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectId = "PVT_kwHODU2Pas4BJrpY"
            const fieldId = "PVTSSF_lAHODU2Pas4BJrpYzg8dLOY"
            const passOptionId = "f0215876"

            const issueNodeId = context.payload.issue.node_id
            const issueNumber = context.payload.issue.number

            // 1. 找 Issue 是否已在 Project
            const query = `
              query($projectId:ID!) {
                node(id:$projectId) {
                  ... on ProjectV2 {
                    items(first:100) {
                      nodes {
                        id
                        content {
                          __typename
                          ... on Issue {
                            number
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `

            const result = await github.graphql(query, { projectId })
            let item = result.node.items.nodes.find(
              n => n.content?.number === issueNumber
            )

            // 2. 如果不在 Project → 加進 Project
            if (!item) {
              const addMutation = `
                mutation($projectId:ID!, $contentId:ID!) {
                  addProjectV2ItemById(input:{
                    projectId:$projectId
                    contentId:$contentId
                  }) {
                    item { id }
                  }
                }
              `
              const addResult = await github.graphql(addMutation, {
                projectId,
                contentId: issueNodeId
              })
              item = addResult.addProjectV2ItemById.item
            }

            // 3. 更新 Verify result = Pass
            const updateMutation = `
              mutation($itemId:ID!, $fieldId:ID!, $optionId:String!) {
                updateProjectV2ItemField(input:{
                  itemId:$itemId
                  fieldId:$fieldId
                  value:{ singleSelectOptionId:$optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `
            await github.graphql(updateMutation, {
              itemId: item.id,
              fieldId,
              optionId: passOptionId
            })
