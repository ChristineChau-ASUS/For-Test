name: Issue Automation

on:
  issues:
    types: [opened]

permissions:
  issues: write       # 允許修改 issue（包含 milestone）
  contents: read      # workflow 基本讀取 repo 權限

jobs:
  set-milestone:
    runs-on: ubuntu-latest

    steps:
      - name: Set milestone to "Demo"
        uses: peter-evans/create-or-update-milestone@v4
        with:
          title: Demo
          state: open
          description: "Milestone for demo issues"
