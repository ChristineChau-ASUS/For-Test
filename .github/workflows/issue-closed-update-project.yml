name: Update Verify result when issue closed

on:
  issues:
    types: [closed]

permissions:
  issues: read
  projects: write

jobs:
  update-project:
    runs-on: ubuntu-latest

    steps:
      - name: Update Verify result to Pass
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNodeId = context.payload.issue.node_id;
            const projectId = "PROJECT_ID_HERE";
            const fieldId = "VERIFY_RESULT_FIELD_ID_HERE";
            const optionId = "PASS_OPTION_ID_HERE";

            // 找出這個 issue 在 project 裡的 item
            const query = `
              query($issue: ID!) {
                node(id: $issue) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { issue: issueNodeId });

            const item = result.node.projectItems.nodes.find(
              n => n.project.id === projectId
            );

            if (!item) {
              console.log("Issue is not in this project, skip.");
              return;
            }

            // 更新欄位
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: "${projectId}"
                    itemId: "${item.id}"
                    fieldId: "${fieldId}"
                    value: { singleSelectOptionId: "${optionId}" }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `);

            console.log("Verify result set to Pass");
