name: Issue Automation

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  manage-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: Test

      - name: Add comment
        uses: peter-evans/create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "Project board欄位資訊不完整,請盡快處理。"

      - name: Assign issue
        uses: kentaro-m/assign-issue@v1
        with:
          issue-number: ${{ github.event.issue.number }}
          assignees: ChristineChau-ASUS



