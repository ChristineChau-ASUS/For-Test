name: Issue Automation

# 觸發條件：每次開新 issue 時
on:
  issues:
    types: [opened]

# workflow 擁有對 issue 的寫入權限
permissions:
  issues: write

jobs:
  manage-issue:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 自動加標籤
      - name: Add "triage" label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: triage

      # 2️⃣ 自動留言
      - name: Add comment
        uses: peter-evans/create-or-update-comment@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            謝謝你的 issue，我們會盡快處理。

      # 3️⃣ 自動 assign
      - name: Assign issue
        uses: kentaro-m/assign-issue@v1
        with:
          issue-number: ${{ github.event.issue.number }}
          assignees: ChristineChau-ASUS   # ← 把這裡改成你的 GitHub ID



